<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Booking Lapangan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="mx-auto flex min-h-screen items-center justify-center px-4 py-10">
    <div class="w-full max-w-xl rounded-[2rem] border border-slate-200 bg-white/95 p-8 shadow-2xl shadow-slate-200/60 backdrop-blur-md sm:p-10">
      <div class="mb-8 flex flex-col gap-2 text-center">
        <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-3xl bg-brand-600 text-white shadow-md">
          <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900">Masuk ke Booking Lapangan</h1>
        <p class="text-sm text-slate-500">Masuk untuk mengelola reservasi dan jadwal lapangan.</p>
      </div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="mb-6 rounded-3xl border border-rose-200 bg-rose-50 px-4 py-4 text-sm text-rose-700">
            {% for message in messages %}
              <p>{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form action="/cek_login" method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
          <input id="username" name="username" type="text" required placeholder="Masukkan username" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-brand-100" />
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
          <input id="password" name="password" type="password" required placeholder="••••••••" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-brand-100" />
        </div>
        <button type="submit" class="w-full rounded-3xl bg-brand-600 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-500/20 transition hover:bg-brand-700">Masuk</button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        Belum punya akun? <a href="/register" class="font-semibold text-brand-600 transition hover:text-brand-700">Daftar sekarang</a>
      </p>
    </div>
  </div>
</body>
</html>
