<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Booking Lapangan</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #00c97a;
      --dark:   #0b1120;
      --card:   #111827;
      --border: #1f2d3d;
      --text:   #e2e8f0;
      --muted:  #64748b;
    }

    body {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* animated mesh background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,201,122,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,201,122,.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0);    }
    }

    /* top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 99px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 10px;
      display: grid; place-items: center;
    }

    .logo-icon svg { width:22px; height:22px; fill:var(--dark); }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }

    .logo-text span { color: var(--green); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .field { margin-bottom: 20px; }

    input {
      width: 100%;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,201,122,.12);
    }

    input::placeholder { color: var(--muted); }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: var(--green);
      color: var(--dark);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: opacity .2s, transform .15s;
    }

    button:hover  { opacity: .88; }
    button:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>
      <div class="logo-text">Booking<br><span>Lapangan</span></div>
    </div>

    <h1>Selamat datang</h1>
    <p class="subtitle">Masuk untuk melanjutkan ke dashboard</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="flash" style="margin-bottom:18px; text-align:center;">
        {% for message in messages %}
          <div>{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
    {% endwith %}

    <form action="/cek_login" method="POST">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit">Masuk →</button>
    </form>
    <p style="margin-top:12px; color: #9ca3af; font-size:14px; text-align:center;">
      Belum punya akun? <a href="/register" style="color: #7dd3fc;">Daftar di sini</a>
    </p>
  </div>
</body>
</html>
